<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Renrich - rich taste, sweet moments{% endblock %}</title>
    <!-- Google Fonts: Poppins & Playfair Display -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='v2/perumahan.output.css') }}">

    <style>
        /* Renrich Theme overrides */
        :root {
            --renrich-brown: #00338C;
            --renrich-gold: #02308E;
            --renrich-cream: #E6E2DD;
            --renrich-dark: #033187;
            --renrich-light: #DFE1E7;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        /* Custom classes for the new theme */
        .bg-renrich-dark {
            background-color: var(--renrich-dark);
        }

        .bg-renrich-brown {
            background-color: var(--renrich-brown);
        }

        .bg-renrich-cream {
            background-color: var(--renrich-cream);
        }

        .bg-renrich-light {
            background-color: var(--renrich-light);
        }

        .text-renrich-dark {
            color: var(--renrich-dark);
        }

        .text-renrich-gold {
            color: var(--renrich-gold);
        }

        .border-renrich-gold {
            border-color: var(--renrich-gold);
        }
    </style>
</head>

<body class="font-poppins bg-light text-dark selection:bg-renrich-gold selection:text-white">

    <!-- Floating WhatsApp -->
    <a id="site-whatsapp-fab" href="{{ data.whatsapp_url }}" target="_blank"
        class="fixed right-6 bottom-6 md:right-10 md:bottom-10 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform duration-300 z-50 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <path
                d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z" />
        </svg>
    </a>

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-40 bg-white shadow-md border-b-2 border-renrich-gold border-opacity-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0">
                    <a href="/" class="flex items-center gap-4">
                        <img src="{{ url_for('static', filename='assets/img/logo_renrich.jpg') }}" alt="Renrich Logo"
                            class="w-10 h-10 rounded-md object-cover border border-renrich-gold">
                        <span
                            class="text-xl md:text-2xl font-playfair font-bold tracking-wide text-renrich-dark">RENRICH</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="/"
                        class="text-gray-700 hover:text-renrich-gold font-medium transition duration-300">Home</a>
                    <a href="/about-us"
                        class="text-gray-700 hover:text-renrich-gold font-medium transition duration-300">Our Story</a>
                    <a href="/menu"
                        class="text-gray-700 hover:text-renrich-gold font-medium transition duration-300">Menu</a>
                    <a href="/atmosphere"
                        class="text-gray-700 hover:text-renrich-gold font-medium transition duration-300">Atmosphere</a>
                    <a href="/promos"
                        class="text-gray-700 hover:text-renrich-gold font-medium transition duration-300">Promos</a>
                    <a href="/contact"
                        class="bg-renrich-dark hover:bg-renrich-brown text-white px-5 py-2 rounded-full font-medium transition duration-300 border border-renrich-gold border-opacity-50">Contact
                        Us</a>
                </div>
            </div>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer class="bg-renrich-dark text-white py-12 border-t-4 border-renrich-gold border-opacity-50">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
            <div class="mb-6 md:mb-0 flex flex-col items-center md:items-start">
                <a href="/" class="flex items-center gap-4">
                    <img src="{{ url_for('static', filename='assets/img/logo_renrich.jpg') }}" alt="Renrich Logo"
                        class="w-12 h-12 rounded-md border border-renrich-gold object-cover shadow-sm">
                    <div class="flex flex-col text-left">
                        <span
                            class="text-2xl font-playfair font-bold text-white tracking-wide leading-none mb-1">RENRICH<span
                                class="text-renrich-gold"> COFFEE</span></span>
                        <span class="text-gray-400 text-sm">rich taste, sweet moments</span>
                    </div>
                </a>
            </div>

            <div class="text-gray-400 mb-6 md:mb-0">
                <ul class="flex justify-center md:justify-start space-x-6">
                    <li><a href="/" class="hover:text-renrich-gold transition">Home</a></li>
                    <li><a href="/about-us" class="hover:text-renrich-gold transition">Our Story</a></li>
                    <li><a href="/menu" class="hover:text-renrich-gold transition">Menu</a></li>
                </ul>
            </div>

            <div class="text-gray-400 text-sm">
                &copy; 2026 Renrich Coffee.<br>All rights reserved.
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='v2/slider.js') }}"></script>
</body>

</html>
